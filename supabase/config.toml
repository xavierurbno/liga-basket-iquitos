# Supabase local / CLI — Liga Basket Iquitos (Fase 6)
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "liga-basket-iquitos"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3001"
additional_redirect_urls = ["http://localhost:3001/auth/callback/"]

[functions.process-player-image]
enabled = true
verify_jwt = false
import_map = "./functions/import_map.json"
entrypoint = "./functions/process-player-image/index.ts"
